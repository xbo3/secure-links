<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Secure</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0a1a;color:#333;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-user-select:none;user-select:none}.wrap{width:100%;max-width:380px}.pw-screen{background:#fff;border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fadeIn .4s;text-align:center}.pw-label{font-size:.78rem;color:#666;margin-bottom:20px}.pw-box{margin-bottom:18px}.pw-box input{width:100%;padding:12px 16px;background:#f5f3ff;border:1.5px solid #e0d4fc;border-radius:10px;color:#333;font-family:'Noto Sans KR';font-size:.95rem;text-align:center;letter-spacing:.12em;outline:none}.pw-box input:focus{border-color:#a855f7;box-shadow:0 0 12px rgba(168,85,247,.15)}.pw-btn{width:100%;padding:13px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;border:none;border-radius:10px;font-family:'Noto Sans KR';font-size:.9rem;font-weight:600;cursor:pointer}.pw-btn:hover{box-shadow:0 4px 20px rgba(168,85,247,.35)}.err{display:none;margin-top:12px;padding:10px;background:#fff0f3;border:1px solid #ffccd5;border-radius:8px;font-size:.78rem;color:#e63946}.err.show{display:block;animation:shake .4s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.info-screen{display:none;animation:fadeIn .5s}.info-card{background:#fff;border-radius:16px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:left}.info-row{margin-bottom:14px}.info-label{font-size:.68rem;color:#999;margin-bottom:3px}.info-value{font-size:1.05rem;font-weight:600;color:#1a1a2e}.info-value.accent{color:#a855f7;font-size:1.2rem;letter-spacing:.06em;font-weight:700}.info-note{margin-top:16px;padding:12px;background:#f5f3ff;border:1px solid #e0d4fc;border-radius:8px;font-size:.78rem;color:#666;line-height:1.5}.timer{margin-top:20px;font-size:.7rem;color:#e63946;text-align:center}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}</style></head>
<body><div class="wrap"><div class="pw-screen" id="pwScreen"><div class="pw-label">패스워드를 입력하세요.</div><div class="pw-box"><input type="password" id="pwInput" placeholder="" autofocus onkeydown="if(event.key==='Enter')decrypt()"></div><button class="pw-btn" onclick="decrypt()">확인</button><div class="err" id="errMsg">비밀번호가 올바르지 않습니다.</div></div><div class="info-screen" id="infoScreen"><div class="info-card"><div class="info-row"><div class="info-label">은행</div><div class="info-value" id="dBank"></div></div><div class="info-row"><div class="info-label">예금주</div><div class="info-value" id="dHolder"></div></div><div class="info-row"><div class="info-label">계좌번호</div><div class="info-value accent" id="dAccount"></div></div><div class="info-note" id="dNote" style="display:none"></div></div><div class="timer" id="timer"></div></div></div>
<script>const ENC={salt:"6DNTMqKhFqJfFpLoqM4VbA==",iv:"YkmgYW4AT/lIJGys",data:"o6GOwOW8M74AegxGHlAnaqHIeX4+0YyiyvvgCsUFMfwVh0W1lkdfHbaQndIVzyrJi2BUuipmCoYnBzGHJfY6N3wimpzVj32njR7ZjJefL9n6trnIUC8D4BpcOTI6fbFBqz4DoTI="};function b64ToUint8(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0))}async function decrypt(){const pw=document.getElementById('pwInput').value;if(!pw)return;try{const enc=new TextEncoder();const salt=b64ToUint8(ENC.salt),iv=b64ToUint8(ENC.iv),data=b64ToUint8(ENC.data);const km=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);const info=JSON.parse(new TextDecoder().decode(dec));document.getElementById('pwScreen').style.display='none';document.getElementById('infoScreen').style.display='block';document.getElementById('dBank').textContent=info.bank;document.getElementById('dHolder').textContent=info.holder;document.getElementById('dAccount').textContent=info.account;if(info.note){document.getElementById('dNote').style.display='block';document.getElementById('dNote').textContent=info.note}const EXP=0;if(EXP>0){let sec=EXP;const ti=setInterval(()=>{sec--;const m=Math.floor(sec/60),s=sec%60;document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s+' 후 자동 만료';if(sec<=0){clearInterval(ti);document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:rgba(255,255,255,.3);font-family:sans-serif">세션이 만료되었습니다.</div>'}},1000);}}catch(e){document.getElementById('errMsg').classList.add('show');setTimeout(()=>document.getElementById('errMsg').classList.remove('show'),2000)}}</script></body></html>
